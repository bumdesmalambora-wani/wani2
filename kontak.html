<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netlify Contact Form</title>
    <style>
        /* Reset Dasar */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Container Form */
        .form-container {
            background: #ffffff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
        }

        /* Styling Label & Input */
        p {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* Penting agar padding tidak merusak lebar */
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #00ad9f; /* Warna khas Netlify */
        }

        /* Styling Tombol */
        button {
            width: 100%;
            padding: 12px;
            background-color: #00ad9f;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #008c81;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Hubungi Kami</h2>
    <form name="contact" method="POST" data-netlify="true">
        <p>
            <label>Nama</label>
            <input type="text" name="name" placeholder="Nama lengkap Anda" required />
        </p>
        <p>
            <label>Email</label>
            <input type="email" name="email" placeholder="email@contoh.com" required />
        </p>
        <p>
            <button type="submit">Kirim Pesan</button>
        </p>
    </form>
</div>

</body>
</html>
