<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Kontak</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    .form-input {
      transition: all 0.3s ease;
    }
    
    .form-input:focus {
      transform: translateY(-2px);
    }
    
    .submit-btn {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    
    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s ease;
    }
    
    .submit-btn:hover::before {
      left: 100%;
    }
    
    .submit-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
    }
    
    .card-container {
      animation: slideUp 0.6s ease-out;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .floating-label {
      transition: all 0.3s ease;
    }
    
    .success-message {
      animation: fadeIn 0.5s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="min-h-full w-full bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 flex items-center justify-center p-6 overflow-auto"><!-- Decorative Elements -->
   <div class="absolute top-10 left-10 w-20 h-20 bg-indigo-300 rounded-full opacity-20 blur-xl"></div>
   <div class="absolute bottom-10 right-10 w-32 h-32 bg-pink-300 rounded-full opacity-20 blur-xl"></div>
   <div class="absolute top-1/2 right-20 w-16 h-16 bg-purple-300 rounded-full opacity-20 blur-xl"></div><!-- Form Card -->
   <div class="card-container w-full max-w-md relative z-10">
    <div class="bg-white rounded-3xl shadow-2xl shadow-indigo-200/50 p-8 md:p-10"><!-- Header -->
     <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-2xl mb-4 shadow-lg shadow-indigo-300/50">
       <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
       </svg>
      </div>
      <h1 id="form-title" class="text-2xl md:text-3xl font-bold text-gray-800">Hubungi Kami</h1>
      <p class="text-gray-500 mt-2 text-sm">Kami senang mendengar dari Anda!</p>
     </div><!-- Form -->
     <form id="contact-form" name="contact" netlify class="space-y-5"><!-- Name Field -->
      <div class="relative"><label id="name-label" for="name" class="block text-sm font-semibold text-gray-700 mb-2">Nama</label>
       <div class="relative"><span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
         </svg></span> <input type="text" id="name" name="name" required class="form-input w-full pl-12 pr-4 py-3.5 bg-gray-50 border-2 border-gray-100 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100" placeholder="Masukkan nama Anda">
       </div>
      </div><!-- Email Field -->
      <div class="relative"><label id="email-label" for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
       <div class="relative"><span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
         </svg></span> <input type="email" id="email" name="email" required class="form-input w-full pl-12 pr-4 py-3.5 bg-gray-50 border-2 border-gray-100 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100" placeholder="email@contoh.com">
       </div>
      </div><!-- Message Field -->
      <div class="relative"><label id="message-label" for="message" class="block text-sm font-semibold text-gray-700 mb-2">Pesan</label>
       <div class="relative"><span class="absolute left-4 top-4 text-gray-400">
         <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
         </svg></span> <textarea id="message" name="message" required rows="4" class="form-input w-full pl-12 pr-4 py-3.5 bg-gray-50 border-2 border-gray-100 rounded-xl text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-500 focus:bg-white focus:ring-4 focus:ring-indigo-100 resize-none" placeholder="Tulis pesan Anda di sini..."></textarea>
       </div>
      </div><!-- Submit Button --> <button id="submit-btn" type="submit" class="submit-btn w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-xl shadow-lg shadow-indigo-300/50 focus:outline-none focus:ring-4 focus:ring-indigo-200"> <span id="btn-text">Kirim Pesan</span> <span id="btn-loading" class="hidden">
        <svg class="animate-spin h-5 w-5 mx-auto" fill="none" viewbox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle> <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z" />
        </svg></span> </button>
     </form><!-- Success Message (Hidden by default) -->
     <div id="success-message" class="hidden success-message text-center py-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
       <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
       </svg>
      </div>
      <h3 class="text-xl font-bold text-gray-800 mb-2">Pesan Terkirim!</h3>
      <p class="text-gray-500 text-sm">Terima kasih telah menghubungi kami. Kami akan segera merespons.</p><button id="reset-btn" class="mt-4 text-indigo-600 font-semibold hover:text-indigo-700 transition-colors"> Kirim pesan lagi → </button>
     </div>
    </div><!-- Footer -->
    <p class="text-center text-gray-400 text-xs mt-6">Informasi Anda aman dan terlindungi 🔒</p>
   </div>
  </div>
  <script>
    const defaultConfig = {
      form_title: 'Hubungi Kami',
      name_label: 'Nama',
      email_label: 'Email',
      message_label: 'Pesan',
      button_text: 'Kirim Pesan',
      primary_color: '#6366f1',
      secondary_color: '#a855f7',
      background_color: '#eef2ff',
      text_color: '#1f2937',
      surface_color: '#ffffff'
    };

    async function onConfigChange(config) {
      document.getElementById('form-title').textContent = config.form_title || defaultConfig.form_title;
      document.getElementById('name-label').textContent = config.name_label || defaultConfig.name_label;
      document.getElementById('email-label').textContent = config.email_label || defaultConfig.email_label;
      document.getElementById('message-label').textContent = config.message_label || defaultConfig.message_label;
      document.getElementById('btn-text').textContent = config.button_text || defaultConfig.button_text;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (value) => {
              config.surface_color = value;
              window.elementSdk.setConfig({ surface_color: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          },
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => {
              config.primary_color = value;
              window.elementSdk.setConfig({ primary_color: value });
            }
          },
          {
            get: () => config.secondary_color || defaultConfig.secondary_color,
            set: (value) => {
              config.secondary_color = value;
              window.elementSdk.setConfig({ secondary_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: undefined,
        fontSizeable: undefined
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['form_title', config.form_title || defaultConfig.form_title],
        ['name_label', config.name_label || defaultConfig.name_label],
        ['email_label', config.email_label || defaultConfig.email_label],
        ['message_label', config.message_label || defaultConfig.message_label],
        ['button_text', config.button_text || defaultConfig.button_text]
      ]);
    }

    // Initialize Element SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    // Form handling
    const form = document.getElementById('contact-form');
    const successMessage = document.getElementById('success-message');
    const btnText = document.getElementById('btn-text');
    const btnLoading = document.getElementById('btn-loading');
    const resetBtn = document.getElementById('reset-btn');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Show loading state
      btnText.classList.add('hidden');
      btnLoading.classList.remove('hidden');
      
      // Simulate form submission
      setTimeout(() => {
        form.classList.add('hidden');
        successMessage.classList.remove('hidden');
        btnText.classList.remove('hidden');
        btnLoading.classList.add('hidden');
      }, 1500);
    });

    resetBtn.addEventListener('click', function() {
      form.reset();
      form.classList.remove('hidden');
      successMessage.classList.add('hidden');
    });
  </script>

</html>
