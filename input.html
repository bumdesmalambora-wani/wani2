<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Input Buku Kas</title>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/di8stbg60/image/upload/v1768368072/BUMDESWANI2_v58wgr.png">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type="number"] {
      -moz-appearance: textfield;
    }
    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
  <div id="app-wrapper" class="h-full w-full overflow-auto">
   <div class="min-h-full flex items-center justify-center p-6">
    <div class="w-full max-w-lg">
     <!-- Form Card -->
     <div class="bg-white rounded-2xl shadow-2xl border border-gray-100 overflow-hidden" style="box-shadow: 0 20px 60px rgba(0,0,0,0.2); transform: translateY(0); transition: transform 0.3s ease;">
      <!-- Header -->
      <div class="px-8 pt-8 pb-6 border-b border-gray-100" style="background: linear-gradient(135deg, rgba(102, 126, 234, 0.05) 0%, rgba(118, 75, 162, 0.05) 100%);">
       <div class="flex items-center gap-3">
        <img src="https://res.cloudinary.com/di8stbg60/image/upload/v1768368072/BUMDESWANI2_v58wgr.png" alt="Logo" class="w-10 h-10 rounded-xl object-cover" style="box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);">
        <h1 id="form-title" class="text-2xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent">Input Data Buku Kas</h1>
       </div>
      </div><!-- Form -->
      <form id="finance-form" class="p-8 space-y-5">
       <!-- Tanggal -->
       <div>
        <label class="block text-sm font-medium text-gray-700 mb-3">Tanggal</label>
        <div class="grid grid-cols-3 gap-3">
         <div><select id="tanggal-hari" name="tanggal-hari" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-gray-700 font-medium hover:border-blue-300 bg-white"> <option value="">Tanggal</option> </select>
         </div>
         <div><select id="tanggal-bulan" name="tanggal-bulan" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-gray-700 font-medium hover:border-blue-300 bg-white"> <option value="">Bulan</option> <option value="01">Januari</option> <option value="02">Februari</option> <option value="03">Maret</option> <option value="04">April</option> <option value="05">Mei</option> <option value="06">Juni</option> <option value="07">Juli</option> <option value="08">Agustus</option> <option value="09">September</option> <option value="10">Oktober</option> <option value="11">November</option> <option value="12">Desember</option> </select>
         </div>
         <div><select id="tanggal-tahun" name="tanggal-tahun" required class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-gray-700 font-medium hover:border-blue-300 bg-white"> <option value="">Tahun</option> </select>
         </div>
        </div>
       </div><!-- Keterangan -->
       <div>
        <label for="keterangan" class="block text-sm font-semibold text-gray-700 mb-2">Keterangan</label> <input type="text" id="keterangan" name="keterangan" required placeholder="Masukkan keterangan transaksi" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-gray-700 placeholder-gray-400 font-medium hover:border-blue-300 bg-white">
       </div><!-- No. Bukti -->
       <div>
        <label for="no_bukti" class="block text-sm font-semibold text-gray-700 mb-2">No. Bukti</label> <input type="text" id="no_bukti" name="no_bukti" required placeholder="Otomatis terisi" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-gray-700 placeholder-gray-400 font-medium hover:border-blue-300 bg-blue-50" readonly style="cursor: not-allowed;">
       </div><!-- Debet & Kredit Row -->
       <div class="grid grid-cols-2 gap-4">
        <!-- Debet -->
        <div>
         <label for="debet" class="block text-sm font-semibold text-gray-700 mb-2">Debet</label>
         <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium">Rp</span> <input type="number" id="debet" name="debet" min="0" step="1" placeholder="0" class="w-full pl-10 pr-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-gray-700 placeholder-gray-400 font-medium hover:border-blue-300 bg-white">
         </div>
        </div><!-- Kredit -->
        <div>
         <label for="kredit" class="block text-sm font-semibold text-gray-700 mb-2">Kredit</label>
         <div class="relative">
          <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm font-medium">Rp</span> <input type="number" id="kredit" name="kredit" min="0" step="1" placeholder="0" class="w-full pl-10 pr-4 py-3 rounded-xl border-2 border-gray-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all text-gray-700 placeholder-gray-400 font-medium hover:border-blue-300 bg-white">
         </div>
        </div>
       </div><!-- Submit Button --> <button type="submit" id="submit-btn" class="w-full py-3.5 rounded-xl font-bold text-white transition-all duration-200 hover:brightness-110 active:scale-[0.98] flex items-center justify-center gap-2 mt-8 shadow-lg" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg><span id="btn-text">Simpan Data</span> </button>
      </form>
     </div><!-- Footer -->
     <p class="text-center text-gray-400 text-sm mt-6">Form Input Buku Kas</p>
    </div>
   </div>
  </div><!-- Success Modal -->
  <div id="success-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(0, 0, 0, 0.5);">
   <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 text-center transform transition-all duration-300" style="animation: modalSlideIn 0.3s ease-out;">
    <div class="mb-6 flex justify-center">
     <div class="w-20 h-20 rounded-full bg-green-100 flex items-center justify-center">
      <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
      </svg>
     </div>
    </div>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Data Berhasil Tersimpan!</h2>
    <p class="text-gray-600 mb-6">Buku Kas Anda telah berhasil ditambahkan ke dalam database.</p>
    <div class="flex gap-3">
     <button id="view-sheet-btn" class="flex-1 py-3 rounded-xl font-semibold text-white transition-all duration-200 hover:brightness-95 active:scale-[0.98]" style="background-color: #4285F4;"> Lihat Data </button> <button id="close-modal-btn" class="flex-1 py-3 rounded-xl font-semibold text-white transition-all duration-200 hover:brightness-95 active:scale-[0.98]" style="background-color: #FFBF00; color: #1f2937;"> Tutup </button>
    </div>
   </div>
  </div><!-- Error Modal -->
  <div id="error-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background: rgba(0, 0, 0, 0.5);">
   <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 text-center transform transition-all duration-300" style="animation: modalSlideIn 0.3s ease-out;">
    <div class="mb-6 flex justify-center">
     <div class="w-20 h-20 rounded-full bg-red-100 flex items-center justify-center">
      <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
     </div>
    </div>
    <h2 class="text-2xl font-bold text-gray-800 mb-2">Gagal Menyimpan Data</h2>
    <p id="error-modal-text" class="text-gray-600 mb-6">Terjadi kesalahan, silakan coba lagi.</p><button id="close-error-modal-btn" class="w-full py-3 rounded-xl font-semibold text-white transition-all duration-200 hover:brightness-95 active:scale-[0.98]" style="background-color: #FFBF00; color: #1f2937;"> Tutup </button>
   </div>
  </div>
  <script>
    const defaultConfig = {
      form_title: 'Input Data Keuangan',
      submit_button_text: 'Simpan Data',
      primary_color: '#FFBF00',
      text_color: '#1f2937',
      background_color: '#f9fafb',
      surface_color: '#ffffff',
      font_family: 'Plus Jakarta Sans',
      font_size: 16
    };

    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby2NYEw_Rj7XSmfF4y0MYWgrj_u1HYvl29UPs792UodZhHLFd76o3Z-n7YC7pXyZMpdCQ/exec';

    async function onConfigChange(config) {
      const formTitle = document.getElementById('form-title');
      const btnText = document.getElementById('btn-text');
      const submitBtn = document.getElementById('submit-btn');
      const body = document.body;
      const card = document.querySelector('.bg-white');

      if (formTitle) {
        formTitle.textContent = config.form_title || defaultConfig.form_title;
        formTitle.style.color = config.text_color || defaultConfig.text_color;
      }

      if (btnText) {
        btnText.textContent = config.submit_button_text || defaultConfig.submit_button_text;
      }

      if (submitBtn) {
        submitBtn.style.backgroundColor = config.primary_color || defaultConfig.primary_color;
      }

      if (body) {
        body.style.backgroundColor = config.background_color || defaultConfig.background_color;
      }

      if (card) {
        card.style.backgroundColor = config.surface_color || defaultConfig.surface_color;
      }

      const fontFamily = config.font_family || defaultConfig.font_family;
      document.documentElement.style.fontFamily = `${fontFamily}, sans-serif`;

      const baseSize = config.font_size || defaultConfig.font_size;
      if (formTitle) formTitle.style.fontSize = `${baseSize * 1.25}px`;
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => config.surface_color || defaultConfig.surface_color,
            set: (value) => {
              config.surface_color = value;
              window.elementSdk.setConfig({ surface_color: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          },
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => {
              config.primary_color = value;
              window.elementSdk.setConfig({ primary_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => {
            config.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => {
            config.font_size = value;
            window.elementSdk.setConfig({ font_size: value });
          }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['form_title', config.form_title || defaultConfig.form_title],
        ['submit_button_text', config.submit_button_text || defaultConfig.submit_button_text]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    // Form submission handler
    const form = document.getElementById('finance-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const successModal = document.getElementById('success-modal');
    const errorModal = document.getElementById('error-modal');
    const errorModalText = document.getElementById('error-modal-text');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const closeErrorModalBtn = document.getElementById('close-error-modal-btn');

    // Close success modal
    closeModalBtn.addEventListener('click', () => {
      successModal.classList.add('hidden');
    });

    // View sheet button
    const viewSheetBtn = document.getElementById('view-sheet-btn');
    viewSheetBtn.addEventListener('click', () => {
      window.open('https://docs.google.com/spreadsheets/d/1kq-rb9UlS2IJCfVRMmlobAR2b2QfM0Ue_dDN6mlBcKM/edit?usp=sharing', '_blank', 'noopener,noreferrer');
    });

    // Close error modal
    closeErrorModalBtn.addEventListener('click', () => {
      errorModal.classList.add('hidden');
    });

    // Close modal when clicking backdrop
    successModal.addEventListener('click', (e) => {
      if (e.target === successModal) {
        successModal.classList.add('hidden');
      }
    });

    errorModal.addEventListener('click', (e) => {
      if (e.target === errorModal) {
        errorModal.classList.add('hidden');
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Hide previous modals
      successModal.classList.add('hidden');
      errorModal.classList.add('hidden');

      // Show loading state
      submitBtn.disabled = true;
      const originalText = btnText.textContent;
      btnText.innerHTML = `
        <svg class="animate-spin h-5 w-5 mr-2" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        Menyimpan...
      `;
      btnText.classList.add('flex', 'items-center', 'justify-center');

      // Prepare form data
      const formData = new FormData(form);
      const hari = formData.get('tanggal-hari');
      const bulan = formData.get('tanggal-bulan');
      const tahun = formData.get('tanggal-tahun');
      const tanggal = `${tahun}-${bulan}-${hari}`;
      
      const data = {
        tanggal: tanggal,
        keterangan: formData.get('keterangan'),
        no_bukti: formData.get('no_bukti'),
        debet: formData.get('debet') || 0,
        kredit: formData.get('kredit') || 0
      };

      try {
        // Set timeout untuk fetch (10 detik)
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);

        const response = await fetch(GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(data),
          signal: controller.signal
        });

        clearTimeout(timeoutId);

        // Show success immediately
        successModal.classList.remove('hidden');
        form.reset();
        initBuktiNumber();

      } catch (error) {
        if (error.name === 'AbortError') {
          errorModalText.textContent = 'Permintaan memakan waktu terlalu lama. Silakan coba lagi.';
        } else {
          errorModalText.textContent = 'Terjadi kesalahan jaringan, silakan coba lagi.';
        }
        errorModal.classList.remove('hidden');
      } finally {
        // Reset button state
        submitBtn.disabled = false;
        btnText.textContent = originalText;
        btnText.classList.remove('flex', 'items-center', 'justify-center');
      }
    });

    // Function to generate next bukti number
    function generateBuktiNumber() {
      let counter = localStorage.getItem('bukti_counter') || 0;
      counter = parseInt(counter) + 1;
      localStorage.setItem('bukti_counter', counter);
      return `NB-BMW-${String(counter).padStart(2, '0')}`;
    }

    // Initialize bukti number
    function initBuktiNumber() {
      const buktiInput = document.getElementById('no_bukti');
      buktiInput.value = generateBuktiNumber();
    }

    // Set today's date as default
    const today = new Date();
    document.getElementById('tanggal-hari').value = String(today.getDate()).padStart(2, '0');
    document.getElementById('tanggal-bulan').value = String(today.getMonth() + 1).padStart(2, '0');
    document.getElementById('tanggal-tahun').value = today.getFullYear();

    // Populate date dropdown (1-31)
    const hariSelect = document.getElementById('tanggal-hari');
    for (let i = 1; i <= 31; i++) {
      const option = document.createElement('option');
      option.value = String(i).padStart(2, '0');
      option.textContent = i;
      hariSelect.appendChild(option);
    }

    // Populate year dropdown (2000-2030)
    const tahunSelect = document.getElementById('tanggal-tahun');
    for (let i = 2000; i <= 2030; i++) {
      const option = document.createElement('option');
      option.value = i;
      option.textContent = i;
      tahunSelect.appendChild(option);
    }

    // Initialize bukti number on page load
    initBuktiNumber();
  </script>
