  <style>
    * {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    
    input[type="number"] {
      -moz-appearance: textfield;
    }
    
    .input-field {
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
    }
    
    .input-field:focus {
      background: rgba(255, 255, 255, 0.15);
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
    }
    
    .input-field::placeholder {
      color: rgba(216, 180, 254, 0.6);
    }

    .input-field {
      color: white;
    }
    
    .submit-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
      transition: all 0.3s ease;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #a855f7 0%, #d946ef 100%);
      transition: left 0.3s ease;
      z-index: -1;
    }
    
    .submit-btn:hover:not(:disabled)::before {
      left: 0;
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
    }
    
    .submit-btn:active:not(:disabled) {
      transform: translateY(-1px);
    }
    
    .picker-btn {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      transition: all 0.3s ease;
      border-radius: 12px;
    }

    .picker-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(168, 85, 247, 0.5);
    }

    .picker-btn:focus {
      outline: none;
      ring: 2px rgba(168, 85, 247, 0.5);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
    }

    .picker-dropdown {
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(168, 85, 247, 0.3);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .picker-option {
      color: rgba(216, 180, 254, 0.9);
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-radius: 8px;
    }

    .picker-option:hover {
      background: rgba(168, 85, 247, 0.2);
      color: white;
    }

    .picker-option.active {
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
      color: white;
      font-weight: 600;
    }

    .form-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border-radius: 24px;
    }

    .label-text {
      color: rgba(216, 180, 254, 0.95);
      font-weight: 600;
      font-size: 0.875rem;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .animate-bounce-custom {
      animation: bounce 1s infinite;
    }

    .success-icon {
      animation: slideIn 0.5s ease;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
      50% { box-shadow: 0 0 40px rgba(168, 85, 247, 0.6); }
    }

    .glow-effect {
      animation: glow 2s infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }

    .float-animation {
      animation: float 3s ease-in-out infinite;
    }

    body { box-sizing: border-box; }
  </style>

  <script>
    const defaultConfig = {
      form_title: 'Input Data Keuangan',
      submit_button_text: 'Simpan Data',
      primary_color: '#7c3aed',
      background_color: '#0f172a',
      text_color: '#e0d5ff',
      surface_color: 'rgba(255, 255, 255, 0.08)',
      accent_color: '#a855f7',
      font_family: 'Plus Jakarta Sans',
      font_size: 16
    };

    async function onConfigChange(config) {
      const formTitle = document.getElementById('form-title');
      const btnText = document.getElementById('btn-text');
      
      if (formTitle) {
        formTitle.textContent = config.form_title || defaultConfig.form_title;
        formTitle.style.fontFamily = `${config.font_family || defaultConfig.font_family}, sans-serif`;
      }
      
      if (btnText) {
        btnText.textContent = config.submit_button_text || defaultConfig.submit_button_text;
      }
      
      const baseSize = config.font_size || defaultConfig.font_size;
      if (formTitle) {
        formTitle.style.fontSize = `${baseSize * 3}px`;
      }
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.primary_color || defaultConfig.primary_color,
            set: (value) => {
              config.primary_color = value;
              window.elementSdk.setConfig({ primary_color: value });
            }
          },
          {
            get: () => config.accent_color || defaultConfig.accent_color,
            set: (value) => {
              config.accent_color = value;
              window.elementSdk.setConfig({ accent_color: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => {
            config.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => {
            config.font_size = value;
            window.elementSdk.setConfig({ font_size: value });
          }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['form_title', config.form_title || defaultConfig.form_title],
        ['submit_button_text', config.submit_button_text || defaultConfig.submit_button_text]
      ]);
    }

    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }

    // Form Elements
    const form = document.getElementById('finance-form');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnLoading = document.getElementById('btn-loading');
    const successModal = document.getElementById('success-modal');
    const modalCloseBtn = document.getElementById('modal-close-btn');
    const modalBukti = document.getElementById('modal-bukti');
    const errorMessage = document.getElementById('error-message');
    const errorDetail = document.getElementById('error-detail');

    // Date Variables
    const today = new Date();
    let selectedDay = today.getDate();
    let selectedMonth = today.getMonth();
    let selectedYear = today.getFullYear();

    const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];

    function updateDateInput() {
      const dateStr = `${selectedYear}-${String(selectedMonth + 1).padStart(2, '0')}-${String(selectedDay).padStart(2, '0')}`;
      document.getElementById('tanggal').value = dateStr;
    }

    function initDatePickers() {
      // Day picker
      const dayPicker = document.getElementById('day-picker');
      for (let i = 1; i <= 31; i++) {
        const option = document.createElement('button');
        option.type = 'button';
        option.textContent = String(i).padStart(2, '0');
        option.className = 'picker-option w-full px-4 py-2 text-left';
        if (i === selectedDay) {
          option.classList.add('active');
        }
        option.addEventListener('click', (e) => {
          e.preventDefault();
          selectedDay = i;
          document.getElementById('day-btn').textContent = String(i).padStart(2, '0');
          dayPicker.classList.add('hidden');
          updateDateInput();
          updateDayPickerHighlight();
        });
        dayPicker.appendChild(option);
      }

      // Month picker
      const monthPicker = document.getElementById('month-picker');
      monthNames.forEach((month, index) => {
        const option = document.createElement('button');
        option.type = 'button';
        option.textContent = month;
        option.className = 'picker-option w-full px-4 py-2 text-left';
        if (index === selectedMonth) {
          option.classList.add('active');
        }
        option.addEventListener('click', (e) => {
          e.preventDefault();
          selectedMonth = index;
          document.getElementById('month-btn').textContent = month;
          monthPicker.classList.add('hidden');
          updateDateInput();
          updateMonthPickerHighlight();
        });
        monthPicker.appendChild(option);
      });

      // Year picker
      const yearPicker = document.getElementById('year-picker');
      for (let i = 2000; i <= 2030; i++) {
        const option = document.createElement('button');
        option.type = 'button';
        option.textContent = i;
        option.className = 'picker-option w-full px-4 py-2 text-left';
        if (i === selectedYear) {
          option.classList.add('active');
        }
        option.addEventListener('click', (e) => {
          e.preventDefault();
          selectedYear = i;
          document.getElementById('year-btn').textContent = i;
          yearPicker.classList.add('hidden');
          updateDateInput();
          updateYearPickerHighlight();
        });
        yearPicker.appendChild(option);
      }

      updateDateInput();
    }

    function updateDayPickerHighlight() {
      const dayPicker = document.getElementById('day-picker');
      const options = dayPicker.querySelectorAll('button');
      options.forEach((opt, idx) => {
        if (idx + 1 === selectedDay) {
          opt.classList.add('active');
        } else {
          opt.classList.remove('active');
        }
      });
    }

    function updateMonthPickerHighlight() {
      const monthPicker = document.getElementById('month-picker');
      const options = monthPicker.querySelectorAll('button');
      options.forEach((opt, idx) => {
        if (idx === selectedMonth) {
          opt.classList.add('active');
        } else {
          opt.classList.remove('active');
        }
      });
    }

    function updateYearPickerHighlight() {
      const yearPicker = document.getElementById('year-picker');
      const options = yearPicker.querySelectorAll('button');
      options.forEach((opt) => {
        if (parseInt(opt.textContent) === selectedYear) {
          opt.classList.add('active');
        } else {
          opt.classList.remove('active');
        }
      });
    }

    // Toggle pickers
    document.getElementById('day-btn').addEventListener('click', (e) => {
      e.preventDefault();
      const dayPicker = document.getElementById('day-picker');
      const monthPicker = document.getElementById('month-picker');
      const yearPicker = document.getElementById('year-picker');
      monthPicker.classList.add('hidden');
      yearPicker.classList.add('hidden');
      dayPicker.classList.toggle('hidden');
    });

    document.getElementById('month-btn').addEventListener('click', (e) => {
      e.preventDefault();
      const dayPicker = document.getElementById('day-picker');
      const monthPicker = document.getElementById('month-picker');
      const yearPicker = document.getElementById('year-picker');
      dayPicker.classList.add('hidden');
      yearPicker.classList.add('hidden');
      monthPicker.classList.toggle('hidden');
    });

    document.getElementById('year-btn').addEventListener('click', (e) => {
      e.preventDefault();
      const dayPicker = document.getElementById('day-picker');
      const monthPicker = document.getElementById('month-picker');
      const yearPicker = document.getElementById('year-picker');
      dayPicker.classList.add('hidden');
      monthPicker.classList.add('hidden');
      yearPicker.classList.toggle('hidden');
    });

    // Close pickers when clicking outside
    document.addEventListener('click', (e) => {
      const dayBtn = document.getElementById('day-btn');
      const monthBtn = document.getElementById('month-btn');
      const yearBtn = document.getElementById('year-btn');
      const dayPicker = document.getElementById('day-picker');
      const monthPicker = document.getElementById('month-picker');
      const yearPicker = document.getElementById('year-picker');

      if (!dayBtn.contains(e.target) && !dayPicker.contains(e.target)) {
        dayPicker.classList.add('hidden');
      }
      if (!monthBtn.contains(e.target) && !monthPicker.contains(e.target)) {
        monthPicker.classList.add('hidden');
      }
      if (!yearBtn.contains(e.target) && !yearPicker.contains(e.target)) {
        yearPicker.classList.add('hidden');
      }
    });

    initDatePickers();

    // Generate No. Bukti
    function generateNoBukti() {
      let buktiCounter = localStorage.getItem('buktiCounter');
      if (!buktiCounter) {
        buktiCounter = 1;
      } else {
        buktiCounter = parseInt(buktiCounter) + 1;
      }
      
      localStorage.setItem('buktiCounter', buktiCounter);
      const noBukti = `NB-BMW-${String(buktiCounter).padStart(2, '0')}`;
      document.getElementById('no_bukti').value = noBukti;
    }

    // Data SDK Implementation
    const dataHandler = {
      onDataChanged(data) {
        // Update bukti counter based on sheet data
        if (data && data.length > 0) {
          localStorage.setItem('buktiCounter', data.length);
        }
      }
    };

    // Initialize Data SDK
    (async () => {
      if (window.dataSdk) {
        const initResult = await window.dataSdk.init(dataHandler);
        if (initResult.isOk) {
          generateNoBukti();
        }
      }
    })();

    // Form submission
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      
      errorMessage.classList.add('hidden');
      submitBtn.disabled = true;
      btnText.classList.add('hidden');
      btnLoading.classList.remove('hidden');
      
      const formData = new FormData(form);
      const debet = formData.get('debet') || 0;
      const kredit = formData.get('kredit') || 0;
      
      const data = {
        tanggal: formData.get('tanggal'),
        keterangan: formData.get('keterangan'),
        no_bukti: formData.get('no_bukti'),
        debet: parseInt(debet) || 0,
        kredit: parseInt(kredit) || 0
      };
      
      try {
        // Save to Canva Sheet via Data SDK
        if (window.dataSdk) {
          const createResult = await window.dataSdk.create(data);
          
          if (createResult.isOk) {
            const noBuktiValue = formData.get('no_bukti');
            modalBukti.textContent = noBuktiValue;
            successModal.classList.remove('hidden');
            
            form.reset();
            updateDateInput();
            document.getElementById('day-btn').textContent = String(selectedDay).padStart(2, '0');
            document.getElementById('month-btn').textContent = monthNames[selectedMonth];
            document.getElementById('year-btn').textContent = selectedYear;
            generateNoBukti();
          } else {
            throw new Error('Gagal menyimpan ke sheet');
          }
        }
      } catch (error) {
        console.error('Submission error:', error);
        errorMessage.classList.remove('hidden');
        errorDetail.textContent = 'Terjadi kesalahan. Silakan coba lagi.';
      } finally {
        submitBtn.disabled = false;
        btnText.classList.remove('hidden');
        btnLoading.classList.add('hidden');
      }
    });

    // Modal handlers
    modalCloseBtn.addEventListener('click', () => {
      successModal.classList.add('hidden');
      generateNoBukti();
    });

    const viewSheetsBtn = document.getElementById('view-sheets-btn');
    viewSheetsBtn.addEventListener('click', () => {
      window.open('https://docs.google.com/spreadsheets/d/1y6-CWAwMnpLkvW-zfjkKe7JTm7ddwAqDeTzrxW17cLE/edit?usp=sharing', '_blank');
    });
  </script>
